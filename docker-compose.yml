services:
  postgres:
    image: postgres:16-alpine
    container_name: nestjs_chat_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-nestjs_chat_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nestjs_chat_redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nestjs_chat_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      QUEUE_REDIS_HOST: redis
    depends_on:
      - postgres
      - redis
    ports:
      - '3000:3000'

volumes:
  postgres_data:
  redis_data:
